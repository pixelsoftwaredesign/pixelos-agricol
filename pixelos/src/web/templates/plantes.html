{% extends "base.html" %}
{% block title %}Base Plantes{% endblock %}
{% block content %}
<div class="toolbar">
  <span class="section-title" style="margin:0">Base de donnees agronomique</span>
  <input id="searchInput" placeholder="Rechercher une plante..." onkeyup="searchPlante(event)" style="flex:1;max-width:300px">
  <select id="catFilter" onchange="loadPlantes()">
    <option value="">Toutes categories</option>
  </select>
  <button class="btn-blue" onclick="loadPlantes()">Actualiser</button>
</div>

<table>
  <thead><tr>
    <th>ID</th><th>Nom commun</th><th>Nom scientifique</th><th>Categorie</th><th>Famille</th><th>Cycle</th>
  </tr></thead>
  <tbody id="plantesTable"></tbody>
</table>

<div id="planteDetail" style="display:none;margin-top:20px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:20px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
    <h3 id="detailName" style="font-size:20px"></h3>
    <button class="btn-orange" onclick="document.getElementById('planteDetail').style.display='none'">Fermer</button>
  </div>
  <div id="detailBody"></div>
</div>

<script>
let allPlantes = [];

async function loadCategories() {
  const r = await fetch('/api/categories');
  const cats = await r.json();
  const sel = document.getElementById('catFilter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c.nom; o.textContent = c.nom + ' (' + c.nb_plantes + ')'; sel.appendChild(o); });
}

async function loadPlantes() {
  const cat = document.getElementById('catFilter').value;
  const url = cat ? '/api/plantes?categorie=' + encodeURIComponent(cat) : '/api/plantes';
  const r = await fetch(url);
  allPlantes = await r.json();
  renderPlantes(allPlantes);
}

function renderPlantes(list) {
  const tbody = document.getElementById('plantesTable');
  tbody.innerHTML = '';
  list.forEach(p => {
    const tr = document.createElement('tr');
    tr.style.cursor = 'pointer';
    tr.onclick = () => showPlante(p.id);
    tr.innerHTML = `<td><strong>${p.id}</strong></td>
      <td>${p.nom_commun}</td>
      <td><em>${p.nom_scientifique}</em></td>
      <td>${p.categorie || ''}</td>
      <td>${p.famille || ''}</td>
      <td><span class="badge ${p.cycle_vie}">${p.cycle_vie}</span></td>`;
    tbody.appendChild(tr);
  });
}

function searchPlante(ev) {
  if (ev.key === 'Enter') {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) { renderPlantes(allPlantes); return; }
    fetch('/api/plantes/search?q=' + encodeURIComponent(q))
      .then(r => r.json())
      .then(data => renderPlantes(data));
  }
}

async function showPlante(id) {
  const r = await fetch('/api/plantes/' + id);
  const p = await r.json();
  document.getElementById('planteDetail').style.display = 'block';
  document.getElementById('detailName').textContent = p.nom_commun + ' (' + p.nom_scientifique + ')';

  let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  html += '<div><strong>Categorie:</strong> ' + (p.categorie||'') + '</div>';
  html += '<div><strong>Famille:</strong> ' + (p.famille||'') + '</div>';
  html += '<div><strong>Cycle:</strong> ' + p.cycle_vie + '</div>';
  html += '<div><strong>Description:</strong> ' + (p.description||'') + '</div>';
  html += '</div>';

  if (p.varietes && p.varietes.length) {
    html += '<h4 style="margin-top:16px">Varietes (' + p.varietes.length + ')</h4><table style="margin-top:8px"><thead><tr><th>Nom</th><th>Eau</th><th>Sol</th><th>Rendement</th></tr></thead><tbody>';
    p.varietes.forEach(v => { html += '<tr><td>' + v.nom + '</td><td>' + (v.besoin_eau||'') + '</td><td>' + (v.type_sol_ideal||'') + '</td><td>' + (v.rendement_estime||'') + '</td></tr>'; });
    html += '</tbody></table>';
  }

  if (p.maladies && p.maladies.length) {
    html += '<h4 style="margin-top:16px">Maladies (' + p.maladies.length + ')</h4><table style="margin-top:8px"><thead><tr><th>Maladie</th><th>Agent</th><th>Traitement</th></tr></thead><tbody>';
    p.maladies.forEach(m => { html += '<tr><td>' + m.nom + '</td><td>' + (m.type_agent||'') + '</td><td>' + (m.type_traitement||'') + '</td></tr>'; });
    html += '</tbody></table>';
  }

  document.getElementById('detailBody').innerHTML = html;
}

loadCategories(); loadPlantes();
</script>
{% endblock %}
