{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="stats-grid" id="stats">
  <div class="stat-card">
    <div class="label">Nœuds en ligne</div>
    <div class="value blue" id="nodesOnline">--</div>
  </div>
  <div class="stat-card">
    <div class="label">Total nœuds</div>
    <div class="value" id="nodesTotal">--</div>
  </div>
  <div class="stat-card">
    <div class="label">Zones irrigation</div>
    <div class="value green" id="zonesCount">--</div>
  </div>
  <div class="stat-card">
    <div class="label">Alertes</div>
    <div class="value red" id="alertsCount">--</div>
  </div>
</div>

<div class="section-title">Nœuds</div>
<table>
  <thead><tr>
    <th>ID</th><th>Type</th><th>Adresse</th><th>Localisation</th><th>Communication</th><th>Status</th>
  </tr></thead>
  <tbody id="nodesTable"></tbody>
</table>

<div class="toolbar" style="margin-top:20px">
  <span class="section-title" style="margin:0">Découverte de zones</span>
  <button class="btn-blue" onclick="scanNow()">Scanner</button>
  <button class="btn-green" onclick="scanAutoRegister()">Scanner + Enregistrer</button>
  <span id="scanStatus" style="font-size:13px;color:var(--text-dim)"></span>
</div>
<table id="scanTable" style="display:none">
  <thead><tr>
    <th>Nom</th><th>Type</th><th>Adresse</th><th>Source</th><th>Action</th>
  </tr></thead>
  <tbody id="scanResults"></tbody>
</table>

<div class="section-title">Zones</div>
<div id="zonesContainer"></div>

<div class="section-title">Règles d'alerte</div>
<ul class="alerts-list" id="alertsList"></ul>

<script>
async function scanNow() {
  document.getElementById('scanStatus').textContent = 'Scan en cours...';
  document.getElementById('scanTable').style.display = 'table';
  try {
    const res = await fetch('/api/scan', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({timeout:15,auto_register:false})});
    const data = await res.json();
    const tbody = document.getElementById('scanResults');
    tbody.innerHTML = '';
    data.total.forEach(d => {
      const tr = document.createElement('tr');
      const name = d.nom || d.type + '_' + (d.addr || d.mac || '?');
      const addr = d.addr || d.mac || d.rssi || '?';
      const src = d.source || d.communication || 'wifi';
      tr.innerHTML = `<td><strong>${name}</strong></td>
        <td><span class="badge ${d.type}">${d.type}</span></td>
        <td>${addr}</td>
        <td>${src}</td>
        <td><button class="btn-green" onclick="registerNode('${name}','${d.type}','${addr}','${src}')" style="padding:2px 10px">+ Zone</button></td>`;
      tbody.appendChild(tr);
    });
    document.getElementById('scanStatus').textContent = data.count.total + ' detecte(s), ' + data.count.new + ' nouveau(x)';
  } catch(e) { document.getElementById('scanStatus').textContent = 'Erreur scan'; }
}

async function scanAutoRegister() {
  document.getElementById('scanStatus').textContent = 'Scan + enregistrement...';
  try {
    const res = await fetch('/api/scan', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({timeout:15,auto_register:true})});
    const data = await res.json();
    document.getElementById('scanStatus').textContent = data.count.registered + ' enregistre(s)';
    fetchStatus(); fetchZones();
  } catch(e) { document.getElementById('scanStatus').textContent = 'Erreur'; }
}

async function registerNode(id, type, addr, com) {
  const zone = prompt('Zone (location) pour ' + id + ' :', 'Auto-detecte');
  if (!zone) return;
  try {
    await fetch('/api/zone/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,type,addr:parseInt(addr)||0,communication:com,location:zone})});
    scanNow(); fetchZones();
  } catch(e) { alert('Erreur: ' + e); }
}

async function fetchZones() {
  try {
    const res = await fetch('/api/zones');
    const zones = await res.json();
    const container = document.getElementById('zonesContainer');
    container.innerHTML = '';
    zones.forEach(z => {
      const div = document.createElement('div');
      div.style.cssText = 'background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:12px';
      div.innerHTML = `<div style="font-weight:700;font-size:16px;margin-bottom:8px">${z.location}</div>
        <div style="font-size:13px;color:var(--text-dim)">${z.count} noeud(s)</div>
        ${z.nodes.map(n => `<div style="display:flex;gap:8px;align-items:center;margin-top:6px;font-size:13px">
          <span class="badge ${n.type}">${n.type}</span>
          <span><strong>${n.id}</strong></span>
          <span style="color:var(--text-dim)">adr ${n.addr} ${n.com}</span>
        </div>`).join('')}`;
      container.appendChild(div);
    });
  } catch(e) {}
}

async function fetchStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    document.getElementById('nodesOnline').textContent = data.nodes_online;
    document.getElementById('nodesTotal').textContent = data.nodes_total;
    const tbody = document.getElementById('nodesTable');
    tbody.innerHTML = '';
    data.nodes.forEach(n => {
      const tr = document.createElement('tr');
      const typeBadge = n.type === 'capteur_sol' ? 'sensor' : n.type === 'vanne' ? 'valve' : '';
      tr.innerHTML = `
        <td><strong>${n.id}</strong></td>
        <td><span class="badge ${typeBadge}">${n.type}</span></td>
        <td>${n.addr}</td>
        <td>${n.location}</td>
        <td>${n.communication || '--'}</td>
        <td><span class="badge ${n.online ? 'online' : 'offline'}">${n.online ? 'ONLINE' : 'OFFLINE'}</span></td>
      `;
      tbody.appendChild(tr);
    });
  } catch(e) { console.error(e); }
}

async function fetchAlerts() {
  try {
    const res = await fetch('/api/alerts');
    const alerts = await res.json();
    const list = document.getElementById('alertsList');
    list.innerHTML = '';
    document.getElementById('alertsCount').textContent = alerts.length;
    alerts.slice(0, 10).forEach(a => {
      const li = document.createElement('li');
      li.className = 'alert-item ' + (a.severity === 'critical' ? 'critical' : '');
      li.innerHTML = `
        <div class="alert-name">${a.name}</div>
        <div class="alert-desc">${a.description || a.condition || ''}</div>
        <div style="margin-top:4px;font-size:12px;color:var(--text-dim)">${a.severity} actions: ${(a.actions || []).join(', ')}</div>
      `;
      list.appendChild(li);
    });
  } catch(e) {}
}

async function fetchIrrigation() {
  try {
    const res = await fetch('/api/irrigation');
    const data = await res.json();
    document.getElementById('zonesCount').textContent = data.zones.length;
  } catch(e) {}
}

fetchStatus(); fetchAlerts(); fetchIrrigation(); fetchZones();
setInterval(fetchStatus, 10000); setInterval(fetchZones, 15000);
</script>
{% endblock %}
