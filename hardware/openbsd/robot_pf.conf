# pf.conf — PixelOS Robot Firewall Rules
# Isolation industrielle : le robot ne parle QU'à l'orchestrateur.
# Tout autre trafic est bloqué sauf PixNet P2P chiffré (WireGuard).
#
# Appliquer avec : pfctl -f /etc/pf.conf
# Tester avec   : pfctl -vnf /etc/pf.conf

# ── Interfaces ──
robot_if = "vio0"            # Interface principale du robot
wg_if    = "wg0"             # WireGuard PixNet (P2P chiffré)

# ── Orchestrateur (le seul point de contact autorisé) ──
orch_ip  = "10.0.0.1"        # IP fixe de l'orchestrateur
orch_net = "10.0.0.0/24"     # Réseau de la flotte

# ── Ports autorisés ──
port_orch_api  = 8080        # API REST Orchestrateur
port_pixnet    = 8337        # PixNet P2P mesh
port_ipc       = 9101        # Bus IPC local (loopback)
port_mqtt      = 1883        # Mosquitto MQTT
port_dns       = 5300        # DNS .pixel
port_ntp       = 123         # NTP
port_pixkey    = 8443        # PixKey auth
port_dhcp      = 67          # DHCP client

# ── Paramètres généraux ──
set block-policy drop
set loginterface egress
set skip on lo

# ── Politique : TOUT BLOQUER par défaut ──
block in log all
block out log all

# ── Loopback ──
pass quick on lo all

# ── WireGuard PixNet (P2P chiffré entre pairs autorisés) ──
pass in  on $wg_if all keep state
pass out on $wg_if all keep state

# ── Orchestrateur : le robot peut PARLER à l'orchestrateur ──
pass out on $robot_if proto tcp from any to $orch_ip port $port_orch_api keep state
pass out on $robot_if proto tcp from any to $orch_ip port $port_mqtt    keep state

# Réponses de l'orchestrateur vers le robot
pass in  on $robot_if proto tcp from $orch_ip to any port $port_orch_api keep state
pass in  on $robot_if proto tcp from $orch_ip to any port $port_mqtt    keep state

# ── PixKey Auth ──
pass out on $robot_if proto tcp from any to $orch_ip port $port_pixkey  keep state
pass in  on $robot_if proto tcp from $orch_ip to any port $port_pixkey  keep state

# ── Réseau local flotte (découverte P2P PixNet) ──
pass out on $robot_if proto udp from any to $orch_net port $port_pixnet keep state
pass in  on $robot_if proto udp from $orch_net to any port $port_pixnet keep state

# ── DHCP (obtention IP au premier boot) ──
pass out on $robot_if proto udp to port $port_dhcp keep state

# ── DNS .pixel ──
pass out on $robot_if proto { tcp, udp } to $orch_ip port $port_dns keep state

# ── NTP ──
pass out on $robot_if proto udp to any port $port_ntp keep state

# ── ICMP (diagnostic réseau uniquement) ──
pass in  on $robot_if proto icmp from $orch_ip icmp-type echoreq
pass out on $robot_if proto icmp icmp-type echoreq

# ── Services locaux (bus IPC, monitoring) ──
pass in  on lo proto tcp to port $port_ipc

# ── PixDefend — Blocage dynamique ──
table <pixos_blocklist> persist
block in quick from <pixos_blocklist> to any

# ── Rate limiting anti-brute-force (port SSH si activé) ──
table <bruteforce> persist
block quick from <bruteforce>
pass in on $robot_if proto tcp to port 22 \
    keep state (max-src-conn 3, max-src-conn-rate 2/60, \
    overload <bruteforce> flush global)

# ── Anti-spoofing ──
block in quick from urpf-failed
block in quick on $robot_if proto tcp flags FUP
block in quick on $robot_if proto tcp flags /SFUP

# ── Log tout blocage ──
block return out log on $robot_if from any to any
